<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等高线理解：从立体到平面（含海拔标签）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2563eb; --accent: #dc2626; --bg: #f8fafc; --text: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); }
        #app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; padding: 0.5rem 1rem; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1rem; font-weight: 700; }
        .header p { font-size: 0.65rem; opacity: 0.9; }
        .header-tip { font-size: 0.6rem; background: rgba(255,255,255,0.2); padding: 0.3rem 0.5rem; border-radius: 4px; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .image-switcher { display: flex; align-items: center; gap: 0.3rem; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 0.3rem 0.6rem; }
        .image-switcher label { font-size: 0.7rem; font-weight: 600; display: flex; align-items: center; gap: 0.2rem; }
        .image-switcher select { padding: 0.25rem 0.5rem; border-radius: 6px; border: none; font-size: 0.7rem; background: white; color: #1e293b; cursor: pointer; }
        .main { flex: 1; display: flex; overflow: hidden; }
        .view-area { flex: 1; position: relative; background: #ffffff; }
        .view-area canvas { display: block; }
        .view-area.mode-2d canvas { display: none; }
        .contour-image { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 90%; max-height: 90%; }
        .view-area.mode-2d .contour-image { display: block; }
        .mode-label { position: absolute; top: 0.5rem; left: 0.5rem; background: var(--primary); color: white; padding: 0.25rem 0.6rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; z-index: 10; }
        .legend { position: absolute; bottom: 0.5rem; right: 0.5rem; background: white; padding: 0.5rem; border-radius: 6px; font-size: 0.55rem; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .legend-title { font-weight: 700; margin-bottom: 0.3rem; }
        .legend-item { display: flex; align-items: center; gap: 0.3rem; margin: 0.15rem 0; }
        .legend-color { width: 14px; height: 3px; border-radius: 1px; }
        .sidebar { width: 240px; background: white; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .panel-title { font-size: 0.75rem; font-weight: 700; padding: 0.6rem; background: #f1f5f9; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.4rem; }
        .panel-title::before { content: ''; width: 3px; height: 12px; background: var(--primary); border-radius: 2px; }
        .terrain-cards { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.4rem; }
        .terrain-card { background: #f8fafc; border: 2px solid transparent; border-radius: 8px; padding: 0.5rem; cursor: pointer; transition: all 0.2s; }
        .terrain-card:hover { background: #f1f5f9; }
        .terrain-card.active { border-color: var(--accent); background: #fef2f2; }
        .card-top { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.2rem; }
        .card-icon { font-size: 1rem; }
        .card-name { font-size: 0.75rem; font-weight: 600; }
        .card-desc { font-size: 0.6rem; color: var(--text-muted); line-height: 1.4; }
        .card-contour { margin-top: 0.3rem; padding-top: 0.3rem; border-top: 1px solid var(--border); font-size: 0.55rem; color: var(--accent); font-weight: 500; }
        .settings { padding: 0.5rem; border-top: 1px solid var(--border); margin-top: auto; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
        .setting-label { font-size: 0.6rem; color: var(--text-muted); }
        .setting-value { font-size: 0.6rem; font-weight: 600; min-width: 35px; text-align: right; }
        input[type="range"] { width: 60px; height: 4px; -webkit-appearance: none; background: #e2e8f0; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; cursor: pointer; }
        .footer { display: flex; justify-content: center; gap: 0.8rem; padding: 0.5rem; background: white; border-top: 1px solid var(--border); }
        .btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.5rem 1.2rem; border: 2px solid var(--border); border-radius: 6px; background: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { border-color: var(--primary); }
        .btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .popup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border-radius: 10px; padding: 1rem; max-width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 100; display: none; }
        .popup.show { display: block; animation: popIn 0.3s ease; }
        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        .popup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
        .popup-title { font-size: 0.9rem; font-weight: 700; color: var(--accent); }
        .popup-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-muted); }
        .popup-content { font-size: 0.7rem; line-height: 1.6; color: var(--text); }
        .popup-tip { margin-top: 0.5rem; padding: 0.4rem; background: #fef3c7; border-radius: 4px; font-size: 0.65rem; color: #92400e; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div>
                <h1>🏔️ 等高线理解：从立体到平面</h1>
                <p>交互式地理学习工具</p>
            </div>
            <div class="header-right">
                <div class="header-tip">🖱️ 拖拽旋转 · 滚轮缩放 · 点击卡片学习</div>
                <div class="image-switcher">
                    <label for="image-select">🖼️ 对比图片</label>
                    <select id="image-select">
                        <option value="0">教学示范图</option>
                        <option value="1">抱犊寨卫星图1</option>
                        <option value="2">抱犊寨卫星图2</option>
                        <option value="3">抱犊寨地形图3</option>
                        <option value="4">抱犊寨地形图4</option>
                    </select>
                </div>
            </div>
        </header>
        <main class="main">
            <div id="view" class="view-area">
                <div class="mode-label" id="mode-label">立体地形视图</div>
                <img id="contour-img" class="contour-image" src="" alt="等高线地形图">
            </div>
            <aside class="sidebar">
                <div class="panel-title">地形特征识别</div>
                <div class="terrain-cards">
                    <div class="terrain-card" data-feature="peak"><div class="card-top"><span class="card-icon">▲</span><span class="card-name">山峰</span></div><div class="card-desc">地势最高的部分，周围低中间高</div><div class="card-contour">等高线：闭合曲线，内高外低</div></div>
                    <div class="terrain-card" data-feature="valley"><div class="card-top"><span class="card-icon">∨</span><span class="card-name">山谷</span></div><div class="card-desc">两山之间低洼的部分</div><div class="card-contour">等高线：凸向高处（凸高为谷）</div></div>
                    <div class="terrain-card" data-feature="ridge"><div class="card-top"><span class="card-icon">∧</span><span class="card-name">山脊</span></div><div class="card-desc">山体延伸的凸起部分</div><div class="card-contour">等高线：凸向低处（凸低为脊）</div></div>
                    <div class="terrain-card" data-feature="saddle"><div class="card-top"><span class="card-icon">🐎</span><span class="card-name">鞍部</span></div><div class="card-desc">两山顶之间相对低洼的部位</div><div class="card-contour">等高线：呈对称的双曲线形</div></div>
                    <div class="terrain-card" data-feature="cliff"><div class="card-top"><span class="card-icon">║</span><span class="card-name">陡崖</span></div><div class="card-desc">近于垂直的山坡</div><div class="card-contour">等高线：密集重叠或重合</div></div>
                    <div class="terrain-card" data-feature="gentle"><div class="card-top"><span class="card-icon">—</span><span class="card-name">缓坡</span></div><div class="card-desc">坡度平缓的地形区域</div><div class="card-contour">等高线：稀疏且间距大</div></div>
                </div>
                <div class="settings">
                    <div class="panel-title">参数设置</div>
                    <div class="setting-row"><span class="setting-label">垂直比例</span><input type="range" id="vscale" min="0.8" max="2" value="1.5" step="0.1"><span class="setting-value" id="vscale-val">1.5x</span></div>
                    <div class="setting-row"><span class="setting-label">等高线数量</span><input type="range" id="ccount" min="12" max="28" value="20"><span class="setting-value" id="ccount-val">20条</span></div>
                </div>
            </aside>
            <div class="popup" id="popup">
                <div class="popup-header"><span class="popup-title" id="popup-title"></span><button class="popup-close" id="popup-close">×</button></div>
                <div class="popup-content" id="popup-content"></div>
                <div class="popup-tip" id="popup-tip"></div>
            </div>
        </main>
        <footer class="footer">
            <button class="btn active" id="btn-3d">🎮 立体模式</button>
            <button class="btn" id="btn-2d">🗺️ 平面模式</button>
            <button class="btn" id="btn-reset">🔄 重置视角</button>
        </footer>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 图片列表
        const imageList = [
            { name: '教学示范图', src: '0.jpg' },
            { name: '抱犊寨卫星图1', src: '1.jpg' },
            { name: '抱犊寨卫星图2', src: '2.jpg' },
            { name: '抱犊寨地形图3', src: '3.jpg' },
            { name: '抱犊寨地形图4', src: '4.jpg' }
        ];
        let currentImageIndex = 0;

        let scene, camera, renderer, controls;
        let terrain, labelGroup;
        let mode = '3d';
        let activeFeature = null;
        let verticalScale = 1.5;
        let contourCount = 20;
        const SIZE = 100;
        const MAX_H = 1.5;
        const GRID = 300;
        const HEIGHT_DISPLAY_SCALE = 4;
        let heightMap = [];
        let sunLight, fillLight;

        // 地形函数（保持不变）
        function terrainHeight(x, z) {
            const nx = (x - 0.5) * 2.8;
            const ny = (z - 0.5) * 2.8;
            const d1 = Math.pow(nx-0.55,2) + Math.pow(ny-0.2,2);
            const peak1 = 1.3 * Math.exp(-d1 / 0.18);
            const d2 = Math.pow(nx+0.55,2) + Math.pow(ny-0.35,2);
            const peak2 = 1.0 * Math.exp(-d2 / 0.22);
            const d3 = Math.pow(nx,2) + Math.pow(ny+0.7,2);
            const peak3 = 1.05 * Math.exp(-d3 / 0.16);
            const ax = 0.55, ay = 0.2, bx = -0.55, by = 0.35;
            const abx = bx-ax, aby = by-ay, ab2 = abx*abx+aby*aby;
            const t = Math.max(0, Math.min(1, ((nx-ax)*abx + (ny-ay)*aby)/ab2));
            const projx = ax + t*abx, projy = ay + t*aby;
            const distToRidge = Math.sqrt(Math.pow(nx-projx,2) + Math.pow(ny-projy,2));
            const ridgeHeight = 0.8 * Math.exp(-distToRidge*distToRidge/0.018) * (1 - Math.abs(t-0.5)*0.4);
            const sx = nx + 0.2, sy = ny + 0.15;
            const saddle = 0.35 * (sx*sx - sy*sy) * Math.exp(-(sx*sx+sy*sy)/0.45);
            const cliff = 0.6 / (1 + Math.exp(-(nx-0.55)/0.04));
            const micro = 0.015*Math.sin(nx*6.0)*Math.cos(ny*5.0) + 0.01*Math.sin(nx*9.0)*Math.sin(ny*7.0);
            const valleyDist1 = Math.sqrt(Math.pow(nx-0.1, 2) + Math.pow(ny+0.5, 2));
            const valley1 = -0.35 * Math.exp(-valleyDist1 * valleyDist1 / 0.02);
            const valleyDist2 = Math.sqrt(Math.pow(nx+0.3, 2) + Math.pow(ny+0.3, 2));
            const valley2 = -0.25 * Math.exp(-valleyDist2 * valleyDist2 / 0.03);
            const valley = valley1 + valley2;
            let h = peak1 + peak2 + peak3 + ridgeHeight + saddle + cliff + micro + valley;
            return Math.max(0, Math.min(MAX_H, h));
        }

        function init() {
            const container = document.getElementById('view');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(48, container.clientWidth/container.clientHeight, 0.1, 500);
            camera.position.set(45, 32, 55);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.maxPolarAngle = Math.PI/2.1;
            controls.minDistance = 25; controls.maxDistance = 120;
            controls.target.set(0, 4, 0);
            scene.add(new THREE.AmbientLight(0x8899bb, 1.8));
            scene.add(new THREE.HemisphereLight(0xffeedd, 0x445566, 1.2));
            sunLight = new THREE.DirectionalLight(0xfff8ee, 4.5);
            sunLight.position.set(8, 10, 3);
            scene.add(sunLight);
            fillLight = new THREE.DirectionalLight(0xaaccff, 1.5);
            fillLight.position.set(-3, 1, -3);
            scene.add(fillLight);
            const gridHelper = new THREE.GridHelper(SIZE, 20, 0xcccccc, 0xdddddd);
            gridHelper.position.y = -2.0;
            scene.add(gridHelper);
            updatePlaneImage();
            createTerrain();
            createContourLabels();
            addLegend(container);
        }

        function updatePlaneImage() {
            const img = document.getElementById('contour-img');
            if (img) {
                img.src = imageList[currentImageIndex].src;
                img.alt = imageList[currentImageIndex].name;
            }
        }

        function createTerrain() {
            if (terrain) scene.remove(terrain);
            const geo = new THREE.PlaneGeometry(SIZE, SIZE, GRID, GRID);
            geo.rotateX(-Math.PI / 2);
            const posArr = geo.attributes.position.array;
            heightMap = new Array(GRID+1);
            for (let i = 0; i <= GRID; i++) heightMap[i] = new Array(GRID+1);
            for (let i = 0; i < posArr.length; i += 3) {
                const x = posArr[i];
                const z = posArr[i+2];
                const u = (x / SIZE) + 0.5;
                const v = (-z / SIZE) + 0.5;
                const h = terrainHeight(u, v);
                posArr[i+1] = h * HEIGHT_DISPLAY_SCALE * verticalScale;
                const ix = Math.round(u * GRID);
                const iz = Math.round(v * GRID);
                if (ix >=0 && ix <= GRID && iz >=0 && iz <= GRID) {
                    heightMap[iz][ix] = h;
                }
            }
            for (let i=0; i<=GRID; i++) {
                for (let j=0; j<=GRID; j++) {
                    if (heightMap[i][j] === undefined) heightMap[i][j] = terrainHeight(j/GRID, i/GRID);
                }
            }
            geo.attributes.position.needsUpdate = true;
            geo.computeVertexNormals();

            const contourSpacing = MAX_H / contourCount;
            const terrainMat = new THREE.ShaderMaterial({
                uniforms: {
                    uContourSpacing: { value: contourSpacing },
                    uMaxHeight: { value: MAX_H },
                    uVerticalScale: { value: verticalScale },
                    uHeightScale: { value: HEIGHT_DISPLAY_SCALE },
                    uSunDirection: { value: new THREE.Vector3() },
                    uAmbient: { value: new THREE.Color(0x8899bb) },
                    uSunColor: { value: new THREE.Color(0xfff8ee) },
                    uFillDir: { value: new THREE.Vector3() },
                    uFillColor: { value: new THREE.Color(0xaaccff) }
                },
                vertexShader: `
                    varying vec3 vWorldPos, vNormal, vViewPos;
                    varying float vHeight;
                    uniform float uVerticalScale;
                    uniform float uHeightScale;
                    uniform float uMaxHeight;
                    void main() {
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPos = worldPos.xyz;
                        vHeight = worldPos.y / (uHeightScale * uVerticalScale);
                        vNormal = normalize(mat3(modelMatrix) * normal);
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        vViewPos = -mv.xyz;
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vWorldPos, vNormal, vViewPos;
                    varying float vHeight;
                    uniform float uContourSpacing;
                    uniform float uMaxHeight;
                    uniform vec3 uSunDirection, uAmbient, uSunColor, uFillDir, uFillColor;
                    vec3 getColor(float h) {
                        h = clamp(h, 0.0, 1.0);
                        if (h < 0.18) return mix(vec3(0.22,0.52,0.18), vec3(0.35,0.62,0.22), h/0.18);
                        else if (h < 0.35) return mix(vec3(0.35,0.62,0.22), vec3(0.55,0.68,0.25), (h-0.18)/0.17);
                        else if (h < 0.5) return mix(vec3(0.55,0.68,0.25), vec3(0.72,0.65,0.28), (h-0.35)/0.15);
                        else if (h < 0.62) return mix(vec3(0.72,0.65,0.28), vec3(0.78,0.55,0.22), (h-0.5)/0.12);
                        else if (h < 0.74) return mix(vec3(0.78,0.55,0.22), vec3(0.68,0.4,0.18), (h-0.62)/0.12);
                        else if (h < 0.85) return mix(vec3(0.68,0.4,0.18), vec3(0.55,0.3,0.15), (h-0.74)/0.11);
                        else if (h < 0.94) return mix(vec3(0.55,0.3,0.15), vec3(0.72,0.65,0.55), (h-0.85)/0.09);
                        else return mix(vec3(0.72,0.65,0.55), vec3(0.9,0.88,0.84), (h-0.94)/0.06);
                    }
                    void main() {
                        float hNorm = vHeight / uMaxHeight;
                        vec3 base = getColor(hNorm);
                        float line = 0.0;
                        float phase = mod(vHeight + uContourSpacing*0.5, uContourSpacing);
                        float halfW = uContourSpacing * 0.06;
                        if (phase < halfW*2.0) line = 1.0 - smoothstep(0.0, halfW, abs(phase-halfW));
                        vec3 N = normalize(vNormal);
                        float diff = max(dot(N, uSunDirection), 0.0)*0.55 + max(dot(N, uFillDir), 0.0)*0.18;
                        float light = 0.55 + diff;
                        vec3 color = base * light * 1.05;
                        color = mix(color, color*0.28, line*0.55);
                        float fresnel = pow(1.0 - abs(dot(N, normalize(vViewPos))), 3.5);
                        color += fresnel * 0.06;
                        gl_FragColor = vec4(color, 1.0);
                    }
                `,
                side: THREE.DoubleSide
            });
            terrainMat.uniforms.uSunDirection.value = sunLight.position.clone().normalize();
            terrainMat.uniforms.uFillDir.value = fillLight.position.clone().normalize();
            terrain = new THREE.Mesh(geo, terrainMat);
            scene.add(terrain);
        }

        function createContourLabels() {
            if (labelGroup) scene.remove(labelGroup);
            labelGroup = new THREE.Group();
            const spacing = MAX_H / contourCount;
            for (let level = spacing; level <= MAX_H; level += spacing) {
                let bestX = 0, bestZ = 0, bestDist = Infinity;
                const step = 4;
                for (let i = 0; i <= GRID; i += step) {
                    for (let j = 0; j <= GRID; j += step) {
                        const h = heightMap[i][j];
                        const diff = Math.abs(h - level);
                        if (diff < bestDist) {
                            bestDist = diff;
                            bestX = j / GRID;
                            bestZ = i / GRID;
                        }
                    }
                }
                const worldX = (bestX - 0.5) * SIZE;
                const worldZ = (0.5 - bestZ) * SIZE;
                const displayH = level * HEIGHT_DISPLAY_SCALE * verticalScale;
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 32;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(Math.round(level * 100) + 'm', 32, 16);
                const texture = new THREE.CanvasTexture(canvas);
                const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
                const sprite = new THREE.Sprite(spriteMat);
                sprite.position.set(worldX, displayH + 2, worldZ);
                sprite.scale.set(8, 4, 1);
                labelGroup.add(sprite);
            }
            scene.add(labelGroup);
        }

        function addLegend(container) {
            const legend = document.createElement('div');
            legend.className = 'legend';
            legend.innerHTML = `<div class="legend-title">📊 高度图例</div>
                <div class="legend-item"><div class="legend-color" style="background:#4ade80"></div><span>低地</span></div>
                <div class="legend-item"><div class="legend-color" style="background:#22c55e"></div><span>山脚</span></div>
                <div class="legend-item"><div class="legend-color" style="background:#84cc16"></div><span>山腰</span></div>
                <div class="legend-item"><div class="legend-color" style="background:#eab308"></div><span>山腰</span></div>
                <div class="legend-item"><div class="legend-color" style="background:#f97316"></div><span>山顶</span></div>
                <div class="legend-item"><div class="legend-color" style="background:#ef4444"></div><span>峰顶</span></div>`;
            container.appendChild(legend);
        }

        function doSwitchMode(m) {
            mode = m;
            document.getElementById('btn-3d').classList.toggle('active', m === '3d');
            document.getElementById('btn-2d').classList.toggle('active', m === '2d');
            document.getElementById('mode-label').textContent = m === '3d' ? '立体地形视图' : '平面等高线图';
            const viewArea = document.getElementById('view');
            if (m === '2d') viewArea.classList.add('mode-2d');
            else viewArea.classList.remove('mode-2d');
            updatePlaneImage();
        }

        function highlightFeature(f) {
            document.querySelectorAll('.terrain-card').forEach(c => c.classList.remove('active'));
            if (!f) return;
            document.querySelector(`.terrain-card[data-feature="${f}"]`)?.classList.add('active');
            showPopup(f);
        }

        function showPopup(f) {
            const info = {
                peak: { title: '⛰️ 山峰', content: '地势最高的部分，周围低中间高。等高线呈闭合曲线，数值从外向内递增。', tip: '等高线闭合，中心最高' },
                valley: { title: '🏞️ 山谷', content: '两山之间低洼的部分，常有溪流。等高线向高处凸出。', tip: '口诀：凸高为谷' },
                ridge: { title: '🏔️ 山脊', content: '山体延伸的凸起部分。等高线向低处凸出。', tip: '口诀：凸低为脊' },
                saddle: { title: '🐎 鞍部', content: '两座山峰之间相对低洼的部位。', tip: '两峰之间最低处' },
                cliff: { title: '🧗 陡崖', content: '近于垂直的山坡。等高线密集重叠。', tip: '等高线重合处' }
            };
            const pop = document.getElementById('popup');
            document.getElementById('popup-title').textContent = info[f]?.title || '';
            document.getElementById('popup-content').textContent = info[f]?.content || '';
            document.getElementById('popup-tip').textContent = info[f]?.tip || '';
            pop.classList.add('show');
        }

        function bindEvents() {
            document.getElementById('btn-3d').onclick = () => doSwitchMode('3d');
            document.getElementById('btn-2d').onclick = () => doSwitchMode('2d');
            document.getElementById('btn-reset').onclick = () => {
                camera.position.set(45, 32, 55);
                controls.target.set(0, 4, 0);
            };
            document.querySelectorAll('.terrain-card').forEach(c => {
                c.onclick = () => {
                    const f = c.dataset.feature;
                    activeFeature = activeFeature === f ? null : f;
                    highlightFeature(activeFeature);
                };
            });
            document.getElementById('popup-close').onclick = () => document.getElementById('popup').classList.remove('show');
            
            document.getElementById('vscale').oninput = e => {
                verticalScale = +e.target.value;
                document.getElementById('vscale-val').textContent = verticalScale.toFixed(1) + 'x';
                scene.remove(terrain); scene.remove(labelGroup);
                createTerrain(); createContourLabels();
            };
            document.getElementById('ccount').oninput = e => {
                contourCount = +e.target.value;
                document.getElementById('ccount-val').textContent = contourCount + '条';
                terrain.material.uniforms.uContourSpacing.value = MAX_H / contourCount;
                scene.remove(labelGroup);
                createContourLabels();
            };
            // 图片切换（顶部下拉框）
            document.getElementById('image-select').onchange = e => {
                currentImageIndex = parseInt(e.target.value);
                updatePlaneImage();
            };
            window.addEventListener('resize', () => {
                const c = document.getElementById('view');
                const r = c.getBoundingClientRect();
                if (r.width > 0 && r.height > 0) {
                    camera.aspect = r.width / r.height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(r.width, r.height);
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if (mode === '2d') return;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('DOMContentLoaded', () => {
            bindEvents();
            init();
            animate();
        });
    </script>
</body>
</html>
