<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等高线理解：真实模型+教学着色</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #2563eb; --accent: #dc2626; }
        html, body { height: 100%; overflow: hidden; font-family: 'PingFang SC', sans-serif; background: #f8fafc; }
        #app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; padding: 0.5rem 1rem; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 1rem; }
        .main { flex: 1; display: flex; overflow: hidden; }
        #view { flex: 1; position: relative; background: #fff; }
        .sidebar { width: 220px; background: white; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-title { font-size: 0.75rem; font-weight: 700; padding: 0.6rem; background: #f1f5f9; }
        .terrain-cards { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem; }
        .terrain-card { background: #f8fafc; border: 2px solid transparent; border-radius: 8px; padding: 0.4rem; cursor: pointer; transition: 0.2s; font-size: 0.7rem; }
        .terrain-card:hover { background: #f1f5f9; }
        .terrain-card.active { border-color: var(--accent); background: #fef2f2; }
        .settings { padding: 0.5rem; border-top: 1px solid #e2e8f0; margin-top: auto; }
        .setting-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.3rem; font-size: 0.6rem; }
        input[type="range"] { width: 70px; }
        .footer { display: flex; justify-content: center; gap: 0.5rem; padding: 0.5rem; background: white; border-top: 1px solid #e2e8f0; }
        .btn { padding: 0.4rem 1rem; border: 2px solid #e2e8f0; border-radius: 6px; background: white; font-size: 0.8rem; cursor: pointer; }
        .btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .mode-label { position: absolute; top: 0.5rem; left: 0.5rem; background: var(--primary); color: white; padding: 0.25rem 0.6rem; border-radius: 4px; font-size: 0.7rem; z-index: 10; }
    </style>
</head>
<body>
    <div id="app">
        <header class="header">
            <div><h1>🏔️ 真实模型 + 等高线上色</h1><p>Hi3D模型 + 教学着色</p></div>
            <div class="header-tip" style="font-size:0.6rem; background:rgba(255,255,255,0.2); padding:0.3rem 0.5rem; border-radius:4px;">🖱️ 拖拽旋转 · 滚轮缩放</div>
        </header>
        <main class="main">
            <div id="view">
                <div class="mode-label">立体地形视图</div>
            </div>
            <aside class="sidebar">
                <div class="panel-title">地形特征识别</div>
                <div class="terrain-cards">
                    <div class="terrain-card" data-feature="peak">⛰️ 山峰 - 等高线闭合，内高外低</div>
                    <div class="terrain-card" data-feature="valley">🏞️ 山谷 - 凸高为谷</div>
                    <div class="terrain-card" data-feature="ridge">🏔️ 山脊 - 凸低为脊</div>
                    <div class="terrain-card" data-feature="saddle">🐎 鞍部 - 两峰间最低</div>
                    <div class="terrain-card" data-feature="cliff">🧗 陡崖 - 等高线密集</div>
                </div>
                <div class="settings">
                    <div class="panel-title">参数设置</div>
                    <div class="setting-row">
                        <span>垂直比例</span>
                        <input type="range" id="vscale" min="1" max="4" value="2" step="0.1">
                        <span id="vscale-val">2x</span>
                    </div>
                    <div class="setting-row">
                        <span>等高线间距</span>
                        <input type="range" id="ccount" min="0.03" max="0.2" value="0.08" step="0.01">
                        <span id="ccount-val">0.08</span>
                    </div>
                </div>
            </aside>
        </main>
        <footer class="footer">
            <button class="btn" id="btn-reset">🔄 重置视角</button>
        </footer>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ---------- 配置 ----------
        const MODEL_FILE = 'terrain.glb'; // 👈 改成您从Hi3D下载的文件名
        const VERTICAL_SCALE = 2;          // 初始垂直拉伸
        let contourSpacing = 0.08;        // 等高线间距

        // 场景对象
        let scene, camera, renderer, controls;
        let currentModel = null;           // 原始模型组
        let elevationMin = 0, elevationMax = 1;

        // ---------- 颜色映射（与V1.1一致） ----------
        function getTerrainColor(normHeight) {
            const h = Math.max(0, Math.min(1, normHeight));
            const stops = [0, 0.18, 0.35, 0.5, 0.62, 0.74, 0.85, 0.94, 1];
            const cols = [
                [0.22,0.52,0.18], [0.35,0.62,0.22], [0.55,0.68,0.25],
                [0.72,0.65,0.28], [0.78,0.55,0.22], [0.68,0.40,0.18],
                [0.55,0.30,0.15], [0.72,0.65,0.55], [0.90,0.88,0.84]
            ];
            for (let i = 0; i < stops.length - 1; i++) {
                if (h >= stops[i] && h <= stops[i+1]) {
                    const t = (h - stops[i]) / (stops[i+1] - stops[i]);
                    return new THREE.Color(
                        cols[i][0] + (cols[i+1][0]-cols[i][0])*t,
                        cols[i][1] + (cols[i+1][1]-cols[i][1])*t,
                        cols[i][2] + (cols[i+1][2]-cols[i][2])*t
                    );
                }
            }
            return new THREE.Color(0.9, 0.88, 0.84);
        }

        // ---------- 光照 ----------
        function addLights() {
            scene.add(new THREE.AmbientLight(0x8899bb, 1.8));
            scene.add(new THREE.HemisphereLight(0xffeedd, 0x445566, 1.2));
            const sun = new THREE.DirectionalLight(0xfff8ee, 4.5);
            sun.position.set(8, 10, 3);
            scene.add(sun);
            const fill = new THREE.DirectionalLight(0xaaccff, 1.5);
            fill.position.set(-3, 1, -3);
            scene.add(fill);
        }

        // ---------- 初始化场景 ----------
        function initScene() {
            const container = document.getElementById('view');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            
            camera = new THREE.PerspectiveCamera(48, container.clientWidth/container.clientHeight, 0.1, 500);
            camera.position.set(5, 3.5, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.maxPolarAngle = Math.PI / 2.1;
            controls.target.set(0, 0.5, 0);
            controls.update();
            
            addLights();
            
            // 地面参考网格
            const grid = new THREE.GridHelper(6, 20, 0xaaaaaa, 0xcccccc);
            grid.position.y = -0.01;
            scene.add(grid);
        }

        // ---------- 加载模型并重新上色 ----------
        function loadAndColorModel() {
            const loader = new GLTFLoader();
            loader.load(MODEL_FILE, 
                (gltf) => {
                    const model = gltf.scene;
                    
                    // 计算模型的全局高度范围
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    elevationMin = box.min.y;
                    elevationMax = box.max.y;
                    const elevationRange = elevationMax - elevationMin || 1;
                    
                    console.log('模型高度范围:', elevationMin, '~', elevationMax);
                    
                    // 遍历所有网格，给每个顶点重新着色（带等高线）
                    model.traverse((child) => {
                        if (child.isMesh) {
                            const geo = child.geometry;
                            if (!geo.attributes.position) return;
                            
                            const posArr = geo.attributes.position.array;
                            const count = posArr.length / 3;
                            
                            // 创建颜色数组
                            const colors = new Float32Array(count * 3);
                            
                            for (let i = 0; i < count; i++) {
                                const worldY = posArr[i*3 + 1]; // 模型空间的Y高度
                                const normH = (worldY - elevationMin) / elevationRange;
                                const col = getTerrainColor(normH);
                                
                                // 等高线：基于高度计算是否绘制深色线
                                const phase = (worldY + contourSpacing*0.5) % contourSpacing;
                                const halfW = contourSpacing * 0.06;
                                let lineFactor = 0;
                                if (phase < halfW * 2) {
                                    lineFactor = 1 - Math.min(1, Math.abs(phase - halfW) / halfW);
                                }
                                // 混合等高线颜色
                                const finalCol = col.clone().lerp(new THREE.Color(0.1, 0.05, 0.05), lineFactor * 0.55);
                                
                                colors[i*3] = finalCol.r;
                                colors[i*3+1] = finalCol.g;
                                colors[i*3+2] = finalCol.b;
                            }
                            
                            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                            child.material = new THREE.MeshLambertMaterial({ 
                                vertexColors: true,
                                side: THREE.DoubleSide 
                            });
                        }
                    });
                    
                    // 居中模型
                    model.position.set(-center.x, -elevationMin, -center.z);
                    
                    scene.add(model);
                    currentModel = model;
                    
                    // 调整相机视角适应模型
                    const maxDim = Math.max(size.x, size.y, size.z);
                    camera.position.set(maxDim * 1.5, maxDim * 1.2, maxDim * 1.5);
                    controls.target.set(0, elevationRange * VERTICAL_SCALE / 2, 0);
                    controls.update();
                },
                (xhr) => {
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    document.querySelector('.mode-label').textContent = `加载中... ${percent}%`;
                },
                (error) => {
                    console.error('模型加载失败:', error);
                    document.querySelector('.mode-label').textContent = '❌ 加载失败，请检查 model.glb 文件';
                }
            );
        }

        // ---------- 垂直比例调节（需重新计算顶点颜色） ----------
        function applyVerticalScale(scale) {
            if (!currentModel) return;
            // 简单方案：缩放整个模型（会拉伸等高线，但效果直观）
            currentModel.scale.y = scale;
            // 更新相机目标
            controls.target.y = (elevationMax - elevationMin) * scale / 2;
        }

        // ---------- 事件绑定 ----------
        function bindEvents() {
            document.getElementById('btn-reset').onclick = () => {
                if (!currentModel) return;
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(center.x + maxDim*1.5, center.y + maxDim*1.2, center.z + maxDim*1.5);
                controls.target.copy(center);
            };
            
            document.getElementById('vscale').oninput = (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById('vscale-val').textContent = val.toFixed(1) + 'x';
                applyVerticalScale(val);
            };
            
            document.getElementById('ccount').oninput = (e) => {
                contourSpacing = parseFloat(e.target.value);
                document.getElementById('ccount-val').textContent = contourSpacing;
                // 需要重新加载模型以更新颜色（简单起见：重新加载）
                scene.remove(currentModel);
                loadAndColorModel();
            };
            
            window.addEventListener('resize', () => {
                const container = document.getElementById('view');
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
        }

        // ---------- 动画循环 ----------
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // ---------- 启动 ----------
        initScene();
        loadAndColorModel();
        bindEvents();
        animate();
    </script>
</body>
</html>
